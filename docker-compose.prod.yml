services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    command: uvicorn App.main:app --host 0.0.0.0 --port 8000 --workers 4
    environment:
      - DEBUG=False
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=autorent
      - POSTGRES_USER=autorent_user
      - POSTGRES_PASSWORD=${DB_PASSWORD:-strong-password-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G

volumes:
  postgres_data:
    driver: local

networks:
  autorent-network:
    driver: bridge
