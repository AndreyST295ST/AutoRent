<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Бронирование - AutoRent</title>
  <link rel="stylesheet" href="/assets/css/main.css" />
</head>
<body>
  <header class="header">
    <div class="container header__container">
      <a href="/" class="logo">
        <span class="logo__icon">🚗</span>
        <span class="logo__text">AutoRent</span>
      </a>
      <nav class="nav" id="mainNav">
        <a href="/pages/Catalog.html" class="nav__link">Каталог</a>
        <a href="/pages/MyBookings.html" class="nav__link">Бронирования</a>
        <a href="/pages/Profile.html" class="nav__link">Профиль</a>
      </nav>
    </div>
  </header>

  <main class="main">
    <div class="container">
      <h1 class="page-title">Оформление бронирования</h1>

      <div class="booking__grid">
        <div class="booking__form">
          <div class="card card--highlight">
            <h3>Автомобиль</h3>
            <div id="carInfo">Загрузка...</div>
          </div>

          <div class="card">
            <h3>Период аренды</h3>
            <div class="form__row">
              <div class="form__group">
                <label for="startDate">Дата начала</label>
                <input type="date" id="startDate" class="input" required />
              </div>
              <div class="form__group">
                <label for="endDate">Дата окончания</label>
                <input type="date" id="endDate" class="input" required />
              </div>
            </div>
          </div>

          <div class="card">
            <h3>Дополнительные услуги</h3>
            <label class="checkbox-card">
              <input type="checkbox" name="service" value="insurance" />
              <div class="checkbox-card__content"><strong>Расширенная страховка</strong></div>
            </label>
            <label class="checkbox-card">
              <input type="checkbox" name="service" value="gps" />
              <div class="checkbox-card__content"><strong>GPS-навигатор</strong></div>
            </label>
          </div>

          <div class="card">
            <label class="checkbox">
              <input type="checkbox" id="terms" required />
              <span>Я согласен с условиями аренды</span>
            </label>
          </div>
        </div>

        <aside class="booking__summary">
          <div class="card card--sticky">
            <h3>Стоимость</h3>
            <div class="price-row">
              <span>Итого:</span>
              <span id="grandTotal" class="price__grand">0 ₽</span>
            </div>
            <button class="btn btn--primary btn--full btn--lg" id="submitBtn" disabled>
              Оформить бронирование
            </button>
          </div>
        </aside>
      </div>
    </div>
  </main>

  <div id="alertContainer" class="alert-container" aria-live="assertive"></div>

  <script src="/assets/js/main.js"></script>
  <script src="/assets/js/api.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const carId = params.get("carId");
    let car = null;
    let currentUser = null;

    function buildLoginRedirectUrl() {
      const next = encodeURIComponent(
        `${window.location.pathname}${window.location.search}${window.location.hash}`
      );
      return `/pages/Login.html?next=${next}`;
    }

    async function ensureAuthorizedUser() {
      const localUser = window.Utils.getCurrentUser();
      if (localUser) {
        return localUser;
      }

      try {
        if (window.authAPI?.me) {
          const remoteUser = await window.authAPI.me();
          window.Utils.setCurrentUser(remoteUser);
          return remoteUser;
        }
      } catch (_) {
        // ignore and redirect to login below
      }

      window.location.href = buildLoginRedirectUrl();
      return null;
    }

    function resolveAssetUrl(url) {
      if (!url) return null;
      if (/^https?:\/\//i.test(url) || url.startsWith("blob:")) return url;
      const normalized = url.startsWith("/") ? url : `/${url}`;
      try {
        const base = window.APP_CONFIG?.API_BASE_URL || "";
        if (base.startsWith("http")) return `${new URL(base).origin}${normalized}`;
      } catch (_) {}
      return normalized;
    }

    function getCarPhotoUrls(carData) {
      if (!Array.isArray(carData?.photo_urls) || !carData.photo_urls.length) {
        return ["/assets/images/logo.svg"];
      }
      const urls = carData.photo_urls.map(resolveAssetUrl).filter(Boolean);
      return urls.length ? urls : ["/assets/images/logo.svg"];
    }

    function getCarPhotosCount(carData) {
      if (!Array.isArray(carData?.photo_urls)) return 0;
      return carData.photo_urls.filter(Boolean).length;
    }

    function getBodyTypeLabel(value) {
      const labels = {
        sedan: "Седан",
        hatchback: "Хэтчбек",
        wagon: "Универсал",
        suv: "Внедорожник",
        crossover: "Кроссовер",
        coupe: "Купе",
        minivan: "Минивэн",
      };
      return labels[value] || value || "-";
    }

    function getDriveTypeLabel(value) {
      const labels = {
        fwd: "Передний",
        rwd: "Задний",
        awd: "Полный",
      };
      return labels[value] || value || "-";
    }

    function getFuelGradeLabel(value) {
      const labels = {
        ai92: "АИ-92",
        ai95: "АИ-95",
        ai98: "АИ-98",
        diesel: "ДТ",
        electric: "Электро",
      };
      return labels[value] || value || "-";
    }

    function renderBookingGallery(carData) {
      const photos = getCarPhotoUrls(carData);
      const slides = photos
        .map(
          (url, index) => `
            <img
              src="${url}"
              alt="${carData.brand} ${carData.model} фото ${index + 1}"
              class="car-card__slide ${index === 0 ? "is-active" : ""}"
              loading="lazy"
              data-index="${index}"
            />
          `
        )
        .join("");

      const controls =
        photos.length > 1
          ? `
            <button type="button" class="car-card__nav car-card__nav--prev" aria-label="Предыдущее фото">‹</button>
            <button type="button" class="car-card__nav car-card__nav--next" aria-label="Следующее фото">›</button>
            <div class="car-card__counter" data-carousel-counter>1 / ${photos.length}</div>
            <div class="car-card__dots" aria-label="Переключение фото">
              ${photos
                .map(
                  (_, index) => `
                    <button
                      type="button"
                      class="car-card__dot ${index === 0 ? "is-active" : ""}"
                      data-index="${index}"
                      aria-label="Фото ${index + 1}"
                    ></button>
                  `
                )
                .join("")}
            </div>
          `
          : "";

      return `
        <div class="booking-car__gallery car-card__image car-card__image--carousel" data-booking-carousel data-index="0">
          ${slides}
          ${controls}
        </div>
      `;
    }

    function setBookingCarouselIndex(carousel, index) {
      const slides = Array.from(carousel.querySelectorAll(".car-card__slide"));
      if (!slides.length) return;
      const total = slides.length;
      const safeIndex = ((index % total) + total) % total;

      slides.forEach((slide, slideIndex) => {
        slide.classList.toggle("is-active", slideIndex === safeIndex);
      });
      carousel.querySelectorAll(".car-card__dot").forEach((dot, dotIndex) => {
        dot.classList.toggle("is-active", dotIndex === safeIndex);
      });

      const counter = carousel.querySelector("[data-carousel-counter]");
      if (counter) counter.textContent = `${safeIndex + 1} / ${total}`;
      carousel.dataset.index = String(safeIndex);
    }

    function initBookingCarousels(root = document) {
      root.querySelectorAll("[data-booking-carousel]").forEach((carousel) => {
        if (carousel.dataset.bound === "1") return;
        carousel.dataset.bound = "1";

        const slidesCount = carousel.querySelectorAll(".car-card__slide").length;
        if (slidesCount <= 1) return;

        const prev = carousel.querySelector(".car-card__nav--prev");
        const next = carousel.querySelector(".car-card__nav--next");

        prev?.addEventListener("click", () => {
          const current = Number(carousel.dataset.index || 0);
          setBookingCarouselIndex(carousel, current - 1);
        });
        next?.addEventListener("click", () => {
          const current = Number(carousel.dataset.index || 0);
          setBookingCarouselIndex(carousel, current + 1);
        });
        carousel.querySelectorAll(".car-card__dot").forEach((dot) => {
          dot.addEventListener("click", () => {
            setBookingCarouselIndex(carousel, Number(dot.dataset.index || 0));
          });
        });

        let touchStartX = null;
        carousel.addEventListener(
          "touchstart",
          (event) => {
            touchStartX = event.changedTouches?.[0]?.clientX ?? null;
          },
          { passive: true }
        );
        carousel.addEventListener("touchend", (event) => {
          if (touchStartX === null) return;
          const touchEndX = event.changedTouches?.[0]?.clientX ?? null;
          if (touchEndX === null) return;
          const deltaX = touchEndX - touchStartX;
          if (Math.abs(deltaX) < 30) return;
          const current = Number(carousel.dataset.index || 0);
          if (deltaX < 0) setBookingCarouselIndex(carousel, current + 1);
          else setBookingCarouselIndex(carousel, current - 1);
        });
      });
    }

    function calculateDays(startDate, endDate) {
      const start = new Date(startDate);
      const end = new Date(endDate);
      const diff = Math.ceil((end - start) / (1000 * 60 * 60 * 24));
      return Math.max(diff, 1);
    }

    function calculateTotal() {
      if (!car) return;
      const startDate = document.getElementById("startDate").value;
      const endDate = document.getElementById("endDate").value;
      const terms = document.getElementById("terms").checked;
      if (!startDate || !endDate) {
        document.getElementById("grandTotal").textContent = "0 ₽";
        document.getElementById("submitBtn").disabled = true;
        return;
      }

      const days = calculateDays(startDate, endDate);
      let total = Number(car.price_per_day || 0) * days;
      if (document.querySelector('input[value="insurance"]').checked) total += 1000 * days;
      if (document.querySelector('input[value="gps"]').checked) total += 300 * days;

      document.getElementById("grandTotal").textContent = window.Utils.formatCurrency(total);
      document.getElementById("submitBtn").disabled = !terms;
    }

    async function loadCarInfo() {
      if (!carId) {
        document.getElementById("carInfo").innerHTML = "<p class='error'>Не выбран автомобиль</p>";
        return;
      }
      try {
        car = await window.carsAPI.getById(carId);
        document.getElementById("carInfo").innerHTML = `
          <div class="booking-car">
            ${renderBookingGallery(car)}
            <div class="booking-car__meta">
              <h4>${car.brand} ${car.model}</h4>
              <p>${car.year || "-"} | ${window.Utils.getTransmissionLabel(car.transmission)} | ${window.Utils.getFuelLabel(car.fuel_type)}</p>
              <div class="booking-car__spec-grid">
                <span>Кузов: ${getBodyTypeLabel(car.body_type)}</span>
                <span>Привод: ${getDriveTypeLabel(car.drive_type)}</span>
                <span>Марка топлива: ${getFuelGradeLabel(car.fuel_grade)}</span>
                <span>Двери: ${car.doors || "-"}</span>
                <span>Мест: ${car.seats || "-"}</span>
              </div>
              <p>Фото: ${getCarPhotosCount(car)}</p>
              <p class="price__value">${window.Utils.formatCurrency(car.price_per_day)} / сутки</p>
            </div>
          </div>
        `;
        initBookingCarousels(document.getElementById("carInfo"));
      } catch (error) {
        document.getElementById("carInfo").innerHTML = "<p class='error'>Ошибка загрузки автомобиля</p>";
      }
    }

    document.getElementById("submitBtn").addEventListener("click", async () => {
      if (!currentUser) {
        window.location.href = buildLoginRedirectUrl();
        return;
      }

      const startDate = document.getElementById("startDate").value;
      const endDate = document.getElementById("endDate").value;
      const submitBtn = document.getElementById("submitBtn");
      if (!startDate || !endDate) {
        window.Utils.showNotification("warning", "Выберите даты аренды");
        return;
      }
      submitBtn.disabled = true;
      submitBtn.textContent = "Обработка...";
      try {
        const additionalServices = {
          insurance: document.querySelector('input[value="insurance"]').checked,
          gps: document.querySelector('input[value="gps"]').checked,
        };
        const booking = await window.bookingsAPI.create({
          car_id: Number(carId),
          start_date: startDate,
          end_date: endDate,
          additional_services: additionalServices,
        });
        window.Utils.showNotification("success", `Бронь #${booking.id} создана`);
        setTimeout(() => {
          window.location.href = "/pages/MyBookings.html";
        }, 900);
      } catch (error) {
        window.Utils.showNotification("error", error.message, "Ошибка бронирования");
        submitBtn.disabled = false;
        submitBtn.textContent = "Оформить бронирование";
      }
    });

    ["startDate", "endDate", "terms"].forEach((id) => {
      const el = document.getElementById(id);
      if (el) el.addEventListener("change", calculateTotal);
    });
    document.querySelectorAll('input[name="service"]').forEach((cb) => {
      cb.addEventListener("change", calculateTotal);
    });

    (async () => {
      currentUser = await ensureAuthorizedUser();
      if (!currentUser) return;
      await loadCarInfo();
      calculateTotal();
    })();
  </script>
</body>
</html>
