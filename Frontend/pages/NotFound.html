<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Страница не найдена — AutoRent</title>
  <link rel="stylesheet" href="/assets/css/main.css" />
</head>
<body class="error-page">
  <div class="error-container" role="main">
    <div class="error-content">
      <span class="error__icon" aria-hidden="true"></span>
      <h1 class="error__code">404</h1>
      <h2 class="error__title">Страница не найдена</h2>
      <p class="error__message">
        К сожалению, страница, которую вы ищете, не существует или была перемещена.
      </p>
      <div class="error__actions">
        <a href="/" class="btn btn--primary btn--lg">
          На главную
        </a>
        <a href="/pages/Catalog.html" class="btn btn--outline btn--lg">
          В каталог
        </a>
      </div>
      <div class="error__help">
        <p>Возможные причины:</p>
        <ul>
          <li>Неправильно введён адрес страницы</li>
          <li>Страница была удалена или перемещена</li>
          <li>Временная ошибка сервера</li>
        </ul>
      </div>
    </div>
  </div>
</body>
</html>
